services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jsp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jsp_password}
      POSTGRES_DB: bus_defects
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsp -d bus_defects"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://jsp:${POSTGRES_PASSWORD:-jsp_password}@db:5432/bus_defects
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@jsp.mk}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
